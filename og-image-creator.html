<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Image Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', Arial, sans-serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 35%),
      radial-gradient(circle at 80% 10%, rgba(255,255,255,0.04), transparent 28%),
      radial-gradient(circle at 60% 80%, rgba(255,255,255,0.035), transparent 32%),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(255,255,255,0.045) 39px 40px),
      repeating-linear-gradient(90deg, transparent 0 59px, rgba(255,255,255,0.018) 59px 60px),
      linear-gradient(to bottom, #d4d2cc, #cbcac3 52%, #c3c1ba);
    position: relative;
  }

  body::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.2;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
    background-size: 8px 8px;
    mix-blend-mode: soft-light;
  }

  .content {
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 40px;
  }

  h1 {
    font-family: 'Archivo Black', Arial Black, sans-serif;
    font-size: 72px;
    line-height: 1;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: #ff4a96;
    margin: 0 0 24px 0;
  }

  p {
    font-size: 24px;
    color: #53504b;
    margin: 0;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="content">
    <h1>I solve problems<br>with narrative.</h1>
    <p>Strategic messaging, innovation, and AI systems<br>that understand how stories work.</p>
  </div>
</body>
</html>
