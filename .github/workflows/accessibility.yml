name: Accessibility Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  a11y-test:
    name: Accessibility Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pa11y
        run: npm install -g pa11y pa11y-ci http-server

      - name: Start local server
        run: |
          http-server -p 8080 &
          sleep 5

      - name: Create pa11y config
        run: |
          cat > .pa11yci.json << 'EOF'
          {
            "defaults": {
              "standard": "WCAG2AA",
              "timeout": 10000,
              "wait": 2000,
              "chromeLaunchConfig": {
                "args": ["--no-sandbox", "--disable-setuid-sandbox"]
              },
              "viewport": {
                "width": 1280,
                "height": 720
              }
            },
            "urls": [
              {
                "url": "http://localhost:8080/",
                "screenCapture": "homepage-screenshot.png",
                "actions": [
                  "wait for element .tl-item to be visible"
                ]
              },
              {
                "url": "http://localhost:8080/strategy.html",
                "screenCapture": "strategy-screenshot.png"
              },
              {
                "url": "http://localhost:8080/agency.html",
                "screenCapture": "agency-screenshot.png"
              },
              {
                "url": "http://localhost:8080/jcpenney.html",
                "screenCapture": "jcpenney-screenshot.png"
              }
            ],
            "reporters": [
              "cli",
              "json"
            ]
          }
          EOF

      - name: Run pa11y accessibility tests
        run: pa11y-ci --config .pa11yci.json
        continue-on-error: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-screenshots
          path: '*.png'

      - name: Run axe accessibility tests
        run: |
          npm install -g @axe-core/cli
          axe http://localhost:8080/ --exit --tags wcag2a,wcag2aa --save axe-results.json
          axe http://localhost:8080/strategy.html --exit --tags wcag2a,wcag2aa
          axe http://localhost:8080/agency.html --exit --tags wcag2a,wcag2aa
          axe http://localhost:8080/jcpenney.html --exit --tags wcag2a,wcag2aa
        continue-on-error: true

      - name: Upload accessibility results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-results
          path: axe-results.json

  color-contrast:
    name: Color Contrast Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check color contrast
        run: |
          npm install -g color-contrast-checker

          # Extract colors from CSS and check contrast
          echo "Checking color contrast ratios..."

          # Your main colors from CSS variables
          cat > color-check.js << 'EOF'
          const colors = {
            background: '#d4d2cc',
            text: '#53504b',
            textSoft: '#716d67',
            magenta: '#ff4a96',
            magentaDeep: '#ea3d86'
          };

          function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
              r: parseInt(result[1], 16),
              g: parseInt(result[2], 16),
              b: parseInt(result[3], 16)
            } : null;
          }

          function getLuminance(r, g, b) {
            const [rs, gs, bs] = [r, g, b].map(c => {
              c = c / 255;
              return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            });
            return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
          }

          function getContrastRatio(color1, color2) {
            const rgb1 = hexToRgb(color1);
            const rgb2 = hexToRgb(color2);
            const l1 = getLuminance(rgb1.r, rgb1.g, rgb1.b);
            const l2 = getLuminance(rgb2.r, rgb2.g, rgb2.b);
            const lighter = Math.max(l1, l2);
            const darker = Math.min(l1, l2);
            return (lighter + 0.05) / (darker + 0.05);
          }

          console.log('Color Contrast Ratios:');
          console.log('======================');
          console.log(`Text on Background: ${getContrastRatio(colors.text, colors.background).toFixed(2)}:1 (Target: 4.5:1 for AA)`);
          console.log(`Soft Text on Background: ${getContrastRatio(colors.textSoft, colors.background).toFixed(2)}:1 (Target: 4.5:1 for AA)`);
          console.log(`Magenta on Background: ${getContrastRatio(colors.magenta, colors.background).toFixed(2)}:1 (Target: 3:1 for large text)`);

          // Check if contrasts meet WCAG AA standards
          const textRatio = getContrastRatio(colors.text, colors.background);
          const softTextRatio = getContrastRatio(colors.textSoft, colors.background);
          const magentaRatio = getContrastRatio(colors.magenta, colors.background);

          let failed = false;
          if (textRatio < 4.5) {
            console.error('❌ Main text fails WCAG AA contrast requirements');
            failed = true;
          } else {
            console.log('✅ Main text meets WCAG AA requirements');
          }

          if (softTextRatio < 4.5) {
            console.error('❌ Soft text fails WCAG AA contrast requirements');
            failed = true;
          } else {
            console.log('✅ Soft text meets WCAG AA requirements');
          }

          if (magentaRatio < 3) {
            console.error('❌ Magenta text fails WCAG AA large text requirements');
            failed = true;
          } else {
            console.log('✅ Magenta text meets WCAG AA large text requirements');
          }

          process.exit(failed ? 1 : 0);
          EOF

          node color-check.js