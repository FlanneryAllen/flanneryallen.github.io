name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Optimize Images
        run: |
          # Install image optimization tools
          sudo apt-get update
          sudo apt-get install -y imagemagick webp

          # Create optimized versions of images
          mkdir -p optimized

          # Convert and optimize JPGs
          for img in *.jpg *.jpeg; do
            if [ -f "$img" ]; then
              echo "Optimizing $img..."
              # Create WebP version
              convert "$img" -quality 85 "optimized/${img%.*}.webp" || true
              # Optimize original
              convert "$img" -quality 85 -strip "optimized/$img" || true
            fi
          done

          # Convert and optimize PNGs
          for img in *.png; do
            if [ -f "$img" ]; then
              echo "Optimizing $img..."
              # Create WebP version
              convert "$img" -quality 85 "optimized/${img%.*}.webp" || true
              # Optimize original
              convert "$img" -strip "optimized/$img" || true
            fi
          done

          # Copy optimized images back
          cp -f optimized/* . 2>/dev/null || true
          rm -rf optimized

      - name: Minify HTML/CSS/JS
        run: |
          # Install minification tools
          npm install -g html-minifier-terser cssnano-cli terser

          # Minify HTML files
          for file in *.html; do
            if [ -f "$file" ]; then
              echo "Minifying $file..."
              html-minifier-terser \
                --collapse-whitespace \
                --remove-comments \
                --minify-css true \
                --minify-js true \
                --input-dir . \
                --output-dir . \
                --file-ext html \
                "$file" -o "$file.min"
              mv "$file.min" "$file"
            fi
          done

          # Note: CSS and JS are inline in your HTML, so they're minified above

      - name: Generate sitemap
        run: |
          cat > sitemap.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://flanneryallen.github.io/</loc>
              <lastmod>$(date -u +"%Y-%m-%d")</lastmod>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://flanneryallen.github.io/strategy.html</loc>
              <lastmod>$(date -u +"%Y-%m-%d")</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.8</priority>
            </url>
            <url>
              <loc>https://flanneryallen.github.io/agency.html</loc>
              <lastmod>$(date -u +"%Y-%m-%d")</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.8</priority>
            </url>
            <url>
              <loc>https://flanneryallen.github.io/jcpenney.html</loc>
              <lastmod>$(date -u +"%Y-%m-%d")</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.7</priority>
            </url>
          </urlset>
          EOF
          # Process the date substitution
          sed -i "s/\$(date -u +\"%Y-%m-%d\")/$(date -u +"%Y-%m-%d")/g" sitemap.xml

      - name: Generate robots.txt
        run: |
          cat > robots.txt << 'EOF'
          User-agent: *
          Allow: /

          Sitemap: https://flanneryallen.github.io/sitemap.xml
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4